openapi: 3.0.0
info:
  title: General Ledger API
  version: 1.0.0
  description: API for managing GL entries, account balances, and financial reporting
servers:
  - url: /api/v1
tags:
  - name: gl-entries
    description: General ledger entry operations
  - name: account-balances
    description: Account balance queries
  - name: posting-rules
    description: GL posting rule configuration
  - name: periods
    description: Accounting period management
paths:
  /gl-entries:
    get:
      tags:
        - gl-entries
      summary: List GL entries
      operationId: listGLEntries
      parameters:
        - name: from_date
          in: query
          description: Filter by posting date (from)
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter by posting date (to)
          schema:
            type: string
            format: date
        - name: account_ids
          in: query
          description: Filter by account IDs
          schema:
            type: array
            items:
              type: integer
        - name: subsidiary_id
          in: query
          description: Filter by subsidiary
          schema:
            type: integer
        - name: department_id
          in: query
          description: Filter by department
          schema:
            type: integer
        - name: location_id
          in: query
          description: Filter by location
          schema:
            type: integer
        - name: class_id
          in: query
          description: Filter by class
          schema:
            type: integer
        - name: source_type
          in: query
          description: Filter by source type
          schema:
            type: string
            enum: [MANUAL, BUSINESS, RECURRING, ADJUSTMENT, CLOSING]
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [DRAFT, POSTED, REVERSED]
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/GLEntry'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - gl-entries
      summary: Create a manual GL entry
      operationId: createGLEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GLEntryCreate'
      responses:
        '201':
          description: GL entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: '#/components/schemas/GLEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /gl-entries/{id}:
    get:
      tags:
        - gl-entries
      summary: Get a specific GL entry
      operationId: getGLEntry
      parameters:
        - name: id
          in: path
          required: true
          description: GL entry ID
          schema:
            type: integer
      responses:
        '200':
          description: GL entry details
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: '#/components/schemas/GLEntryDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /gl-entries/{id}/post:
    post:
      tags:
        - gl-entries
      summary: Post a GL entry
      operationId: postGLEntry
      parameters:
        - name: id
          in: path
          required: true
          description: GL entry ID
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                posting_date:
                  type: string
                  format: date
                  description: Override posting date (defaults to today)
      responses:
        '200':
          description: GL entry posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  entry:
                    $ref: '#/components/schemas/GLEntry'
                  balance_updates:
                    type: array
                    items:
                      $ref: '#/components/schemas/BalanceUpdate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Entry cannot be posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gl-entries/{id}/reverse:
    post:
      tags:
        - gl-entries
      summary: Reverse a GL entry
      operationId: reverseGLEntry
      parameters:
        - name: id
          in: path
          required: true
          description: GL entry ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reversal_date
                - reason
              properties:
                reversal_date:
                  type: string
                  format: date
                reason:
                  type: string
      responses:
        '200':
          description: GL entry reversed
          content:
            application/json:
              schema:
                type: object
                properties:
                  original_entry:
                    $ref: '#/components/schemas/GLEntry'
                  reversal_entry:
                    $ref: '#/components/schemas/GLEntry'

  /account-balances:
    get:
      tags:
        - account-balances
      summary: Get account balances
      operationId: getAccountBalances
      parameters:
        - name: as_of_date
          in: query
          description: Balance as of date
          required: true
          schema:
            type: string
            format: date
        - name: account_ids
          in: query
          description: Filter by account IDs
          schema:
            type: array
            items:
              type: integer
        - name: subsidiary_id
          in: query
          description: Filter by subsidiary
          schema:
            type: integer
        - name: department_id
          in: query
          description: Filter by department
          schema:
            type: integer
        - name: location_id
          in: query
          description: Filter by location
          schema:
            type: integer
        - name: class_id
          in: query
          description: Filter by class
          schema:
            type: integer
        - name: non_zero_only
          in: query
          description: Only return non-zero balances
          schema:
            type: boolean
            default: false
        - name: group_by
          in: query
          description: Group results by dimensions
          schema:
            type: array
            items:
              type: string
              enum: [account, subsidiary, department, location, class]
      responses:
        '200':
          description: Account balances
          content:
            application/json:
              schema:
                type: object
                properties:
                  balances:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountBalance'
                  as_of_date:
                    type: string
                    format: date
                  total_debit:
                    type: number
                    format: decimal
                  total_credit:
                    type: number
                    format: decimal

  /account-balances/trial-balance:
    get:
      tags:
        - account-balances
      summary: Generate trial balance
      operationId: getTrialBalance
      parameters:
        - name: as_of_date
          in: query
          description: Trial balance as of date
          required: true
          schema:
            type: string
            format: date
        - name: subsidiary_id
          in: query
          description: Filter by subsidiary
          schema:
            type: integer
        - name: level_of_detail
          in: query
          description: Detail level
          schema:
            type: string
            enum: [summary, detail, by_dimension]
            default: summary
        - name: include_ytd
          in: query
          description: Include year-to-date amounts
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Trial balance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialBalance'

  /posting-rules:
    get:
      tags:
        - posting-rules
      summary: List posting rules
      operationId: listPostingRules
      parameters:
        - name: transaction_type
          in: query
          description: Filter by transaction type
          schema:
            type: string
        - name: active_only
          in: query
          description: Only return active rules
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Posting rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: '#/components/schemas/PostingRule'
    post:
      tags:
        - posting-rules
      summary: Create a posting rule
      operationId: createPostingRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleCreate'
      responses:
        '201':
          description: Posting rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: '#/components/schemas/PostingRule'

  /posting-rules/{id}:
    get:
      tags:
        - posting-rules
      summary: Get a posting rule
      operationId: getPostingRule
      parameters:
        - name: id
          in: path
          required: true
          description: Posting rule ID
          schema:
            type: integer
      responses:
        '200':
          description: Posting rule details
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: '#/components/schemas/PostingRule'
    put:
      tags:
        - posting-rules
      summary: Update a posting rule
      operationId: updatePostingRule
      parameters:
        - name: id
          in: path
          required: true
          description: Posting rule ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleUpdate'
      responses:
        '200':
          description: Posting rule updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: '#/components/schemas/PostingRule'

  /periods:
    get:
      tags:
        - periods
      summary: List accounting periods
      operationId: listPeriods
      parameters:
        - name: subsidiary_id
          in: query
          description: Filter by subsidiary
          schema:
            type: integer
        - name: fiscal_year
          in: query
          description: Filter by fiscal year
          schema:
            type: string
            pattern: '^\d{4}$'
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [OPEN, CLOSED, LOCKED]
        - name: include_future
          in: query
          description: Include future periods
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Accounting periods list
          content:
            application/json:
              schema:
                type: object
                properties:
                  periods:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountingPeriod'
    post:
      tags:
        - periods
      summary: Create accounting periods
      operationId: createPeriods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeriodCreate'
      responses:
        '201':
          description: Periods created
          content:
            application/json:
              schema:
                type: object
                properties:
                  periods:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountingPeriod'

  /periods/{id}/close:
    post:
      tags:
        - periods
      summary: Close an accounting period
      operationId: closePeriod
      parameters:
        - name: id
          in: path
          required: true
          description: Period ID
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Force close even with unposted entries
                  default: false
      responses:
        '200':
          description: Period closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    $ref: '#/components/schemas/AccountingPeriod'
                  closing_entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/GLEntry'

components:
  schemas:
    GLEntry:
      type: object
      required:
        - transaction_id
        - transaction_number
        - transaction_date
        - posting_date
        - status
        - total_debit_amount
        - total_credit_amount
      properties:
        transaction_id:
          type: integer
        transaction_number:
          type: string
        subsidiary_id:
          type: integer
        transaction_date:
          type: string
          format: date
        posting_date:
          type: string
          format: date
        period_id:
          type: integer
        transaction_type:
          type: string
          enum: [MANUAL, BUSINESS, RECURRING, ADJUSTMENT, CLOSING]
        source_system:
          type: string
        source_transaction_id:
          type: integer
        source_transaction_type:
          type: string
        description:
          type: string
        reference_number:
          type: string
        base_currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        total_debit_amount:
          type: number
          format: decimal
        total_credit_amount:
          type: number
          format: decimal
        status:
          type: string
          enum: [DRAFT, POSTED, REVERSED]
        created_date:
          type: string
          format: date-time

    GLEntryDetail:
      allOf:
        - $ref: '#/components/schemas/GLEntry'
        - type: object
          properties:
            lines:
              type: array
              items:
                $ref: '#/components/schemas/GLLine'
            audit_trail:
              type: array
              items:
                $ref: '#/components/schemas/AuditEntry'

    GLEntryCreate:
      type: object
      required:
        - subsidiary_id
        - transaction_date
        - description
        - lines
      properties:
        subsidiary_id:
          type: integer
        transaction_date:
          type: string
          format: date
        description:
          type: string
        reference_number:
          type: string
        lines:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/GLLineCreate'

    GLLine:
      type: object
      required:
        - line_id
        - line_number
        - account_id
        - debit_amount
        - credit_amount
      properties:
        line_id:
          type: integer
        line_number:
          type: integer
        account_id:
          type: integer
        account_number:
          type: string
        account_name:
          type: string
        class_id:
          type: integer
        department_id:
          type: integer
        location_id:
          type: integer
        subsidiary_id:
          type: integer
        debit_amount:
          type: number
          format: decimal
        credit_amount:
          type: number
          format: decimal
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        exchange_rate:
          type: number
          format: decimal
        base_debit_amount:
          type: number
          format: decimal
        base_credit_amount:
          type: number
          format: decimal
        description:
          type: string
        reference_1:
          type: string
        reference_2:
          type: string
        project_id:
          type: integer

    GLLineCreate:
      type: object
      required:
        - account_id
      properties:
        account_id:
          type: integer
        debit_amount:
          type: number
          format: decimal
          minimum: 0
        credit_amount:
          type: number
          format: decimal
          minimum: 0
        class_id:
          type: integer
        department_id:
          type: integer
        location_id:
          type: integer
        description:
          type: string
        reference_1:
          type: string
        reference_2:
          type: string
        project_id:
          type: integer

    AccountBalance:
      type: object
      properties:
        account_id:
          type: integer
        account_number:
          type: string
        account_name:
          type: string
        account_type:
          type: string
        subsidiary_id:
          type: integer
        class_id:
          type: integer
        department_id:
          type: integer
        location_id:
          type: integer
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
        beginning_balance:
          type: number
          format: decimal
        period_debit:
          type: number
          format: decimal
        period_credit:
          type: number
          format: decimal
        ending_balance:
          type: number
          format: decimal
        ytd_debit:
          type: number
          format: decimal
        ytd_credit:
          type: number
          format: decimal
        ytd_balance:
          type: number
          format: decimal

    TrialBalance:
      type: object
      properties:
        as_of_date:
          type: string
          format: date
        subsidiary_id:
          type: integer
        accounts:
          type: array
          items:
            type: object
            properties:
              account_id:
                type: integer
              account_number:
                type: string
              account_name:
                type: string
              account_type:
                type: string
              normal_balance:
                type: string
                enum: [DEBIT, CREDIT]
              debit_balance:
                type: number
                format: decimal
              credit_balance:
                type: number
                format: decimal
              ytd_debit:
                type: number
                format: decimal
              ytd_credit:
                type: number
                format: decimal
        total_debit:
          type: number
          format: decimal
        total_credit:
          type: number
          format: decimal
        in_balance:
          type: boolean

    PostingRule:
      type: object
      properties:
        rule_id:
          type: integer
        transaction_type_id:
          type: integer
        subsidiary_id:
          type: integer
        rule_name:
          type: string
        sequence_number:
          type: integer
        line_type:
          type: string
          enum: [ITEM, TAX, DISCOUNT, SHIPPING, ALL]
        condition_sql:
          type: string
        debit_account_id:
          type: integer
        credit_account_id:
          type: integer
        amount_formula:
          type: string
        description_template:
          type: string
        is_active:
          type: boolean
        effective_date:
          type: string
          format: date
        expiration_date:
          type: string
          format: date

    PostingRuleCreate:
      type: object
      required:
        - transaction_type_id
        - rule_name
        - line_type
      properties:
        transaction_type_id:
          type: integer
        subsidiary_id:
          type: integer
        rule_name:
          type: string
        sequence_number:
          type: integer
          default: 10
        line_type:
          type: string
          enum: [ITEM, TAX, DISCOUNT, SHIPPING, ALL]
        condition_sql:
          type: string
        debit_account_id:
          type: integer
        credit_account_id:
          type: integer
        amount_formula:
          type: string
        description_template:
          type: string
        is_active:
          type: boolean
          default: true
        effective_date:
          type: string
          format: date

    PostingRuleUpdate:
      type: object
      properties:
        rule_name:
          type: string
        sequence_number:
          type: integer
        condition_sql:
          type: string
        debit_account_id:
          type: integer
        credit_account_id:
          type: integer
        amount_formula:
          type: string
        description_template:
          type: string
        is_active:
          type: boolean
        expiration_date:
          type: string
          format: date

    AccountingPeriod:
      type: object
      properties:
        period_id:
          type: integer
        subsidiary_id:
          type: integer
        period_name:
          type: string
        fiscal_year:
          type: string
          pattern: '^\d{4}$'
        period_number:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        period_type:
          type: string
          enum: [MONTHLY, QUARTERLY, YEARLY]
        status:
          type: string
          enum: [OPEN, CLOSED, LOCKED]
        is_adjustment_period:
          type: boolean
        closed_date:
          type: string
          format: date-time

    PeriodCreate:
      type: object
      required:
        - subsidiary_id
        - fiscal_year
        - period_type
      properties:
        subsidiary_id:
          type: integer
        fiscal_year:
          type: string
          pattern: '^\d{4}$'
        period_type:
          type: string
          enum: [MONTHLY, QUARTERLY, YEARLY]
        fiscal_year_start_month:
          type: integer
          minimum: 1
          maximum: 12
          default: 1

    BalanceUpdate:
      type: object
      properties:
        account_id:
          type: integer
        period_id:
          type: integer
        debit_change:
          type: number
          format: decimal
        credit_change:
          type: number
          format: decimal
        new_balance:
          type: number
          format: decimal

    AuditEntry:
      type: object
      properties:
        audit_id:
          type: integer
        action:
          type: string
        user_id:
          type: integer
        timestamp:
          type: string
          format: date-time
        details:
          type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []