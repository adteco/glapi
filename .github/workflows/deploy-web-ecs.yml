name: Deploy Web ECS

on:
  push:
    branches: [staging, main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "infra/aws-ecs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-web-ecs.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        default: staging
        options:
          - staging
          - production
      image_tag:
        description: "Deploy an existing ECR image tag"
        required: false
        type: string

concurrency:
  group: deploy-web-ecs-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.glapi.net' }}
  WEB_BASE_URL: ${{ vars.WEB_BASE_URL || 'https://glapi.net' }}

jobs:
  deploy:
    name: Deploy Web to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    runs-on: ubicloud-standard-4-arm
    timeout-minutes: 35
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: Resolve deployment target
        run: |
          if [ "$ENVIRONMENT" = "production" ]; then
            echo "ECR_REPO=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/glapi-prod-web" >> "$GITHUB_ENV"
            echo "ECS_CLUSTER=glapi-prod-cluster" >> "$GITHUB_ENV"
            echo "ECS_SERVICE=glapi-prod-web" >> "$GITHUB_ENV"
            echo "WEB_URL=${WEB_BASE_URL}" >> "$GITHUB_ENV"
            echo "API_HEALTH_URL=${API_BASE_URL}/api/health" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_APP_URL=${WEB_BASE_URL}" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_API_URL=${API_BASE_URL}" >> "$GITHUB_ENV"
            echo "BETTER_AUTH_URL=${API_BASE_URL}" >> "$GITHUB_ENV"
          else
            echo "ECR_REPO=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/glapi-staging-web" >> "$GITHUB_ENV"
            echo "ECS_CLUSTER=glapi-staging-cluster" >> "$GITHUB_ENV"
            echo "ECS_SERVICE=glapi-staging-web" >> "$GITHUB_ENV"
            echo "WEB_URL=https://glapi-staging.adteco.com" >> "$GITHUB_ENV"
            echo "API_HEALTH_URL=https://glapi-staging-api.adteco.com/api/health" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_APP_URL=https://glapi-staging.adteco.com" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_API_URL=https://glapi-staging-api.adteco.com" >> "$GITHUB_ENV"
            echo "BETTER_AUTH_URL=https://glapi-staging-api.adteco.com" >> "$GITHUB_ENV"
          fi

          if [ -z "$AWS_ACCOUNT_ID" ]; then
            echo "::error::GitHub Actions variable AWS_ACCOUNT_ID is required"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check API health before web deploy
        run: |
          for i in 1 2 3; do
            STATUS="$(curl -s -o /dev/null -w "%{http_code}" "$API_HEALTH_URL" || true)"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "::warning::API health check did not pass before web deploy."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web... build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/glapi
          BETTER_AUTH_SECRET: build-time-placeholder-build-time-placeholder
          BETTER_AUTH_URL: ${{ env.BETTER_AUTH_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate ECS infrastructure exists
        run: |
          ECR_REPO_NAME="$(echo "$ECR_REPO" | cut -d'/' -f2)"

          aws ecr describe-repositories \
            --repository-names "$ECR_REPO_NAME" \
            --region "$AWS_REGION" >/dev/null

          aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --region "$AWS_REGION" \
            --query 'clusters[0].clusterArn' \
            --output text | grep -v None

          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].serviceArn' \
            --output text | grep -v None

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: image-tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            TAG="$(echo "${{ github.sha }}" | cut -c1-7)"
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify existing image exists
        if: steps.image-tag.outputs.skip_build == 'true'
        run: |
          aws ecr describe-images \
            --repository-name "$(echo "$ECR_REPO" | cut -d'/' -f2)" \
            --image-ids imageTag=${{ steps.image-tag.outputs.tag }} \
            --region "$AWS_REGION" >/dev/null

      - name: Set up Docker Buildx
        if: steps.image-tag.outputs.skip_build == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.image-tag.outputs.skip_build == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.ECR_REPO }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.ECR_REPO }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Register task definition revision
        id: task-def
        run: |
          IMAGE="${ECR_REPO}:${{ steps.image-tag.outputs.tag }}"
          TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].taskDefinition' \
            --output text)"

          TASK_DEF_JSON="$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' \
            --output json)"

          NEW_TASK_DEF="$(echo "$TASK_DEF_JSON" | jq \
            --arg IMAGE "$IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
             .containerDefinitions[0].image = $IMAGE |
             .runtimePlatform = {"cpuArchitecture": "ARM64", "operatingSystemFamily": "LINUX"}')"

          NEW_ARN="$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy task definition
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.task-def.outputs.arn }}" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --no-cli-pager

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

      - name: Verify running image
        run: |
          EXPECTED_TAG="${{ steps.image-tag.outputs.tag }}"
          ACTIVE_TASK_DEF="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].taskDefinition' \
            --output text)"
          RUNNING_IMAGE="$(aws ecs describe-task-definition \
            --task-definition "$ACTIVE_TASK_DEF" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.containerDefinitions[0].image' \
            --output text)"

          if [[ "$RUNNING_IMAGE" != *":${EXPECTED_TAG}" ]]; then
            echo "::error::Image mismatch. Expected tag $EXPECTED_TAG but service is running $RUNNING_IMAGE"
            exit 1
          fi

      - name: Web smoke
        run: |
          for i in 1 2 3 4 5; do
            STATUS="$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL" || true)"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
              exit 0
            fi
            if [ "$i" = "5" ]; then
              echo "::error::Web smoke failed after 5 attempts; last status: $STATUS"
              exit 1
            fi
            sleep 15
          done
