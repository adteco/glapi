name: Environment Verification

on:
  push:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      target:
        description: Target environment to verify
        required: true
        default: both
        type: choice
        options:
          - staging
          - production
          - both

concurrency:
  group: env-verification-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target || 'auto' }}
  cancel-in-progress: true

jobs:
  verify-staging:
    name: Verify Staging API Smoke
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'staging' || github.event.inputs.target == 'both'))
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging config
        run: |
          if [ -z "$KARATE_BASE_URL" ]; then
            echo "::error::staging environment variable API_BASE_URL is not configured"
            exit 1
          fi
          echo "Running against: $KARATE_BASE_URL"
        env:
          KARATE_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Run tRPC auth smoke suite (staging)
        run: pnpm test:karate:trpc-auth
        env:
          KARATE_BASE_URL: ${{ vars.API_BASE_URL }}
          KARATE_ORG_ID: ${{ vars.KARATE_ORG_ID }}
          KARATE_USER_ID: ${{ vars.KARATE_USER_ID }}
          KARATE_API_KEY: ${{ secrets.KARATE_API_KEY }}

  verify-production:
    name: Verify Production API Smoke
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'production' || github.event.inputs.target == 'both'))
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production config
        run: |
          if [ -z "$KARATE_BASE_URL" ]; then
            echo "::error::production environment variable API_BASE_URL is not configured"
            exit 1
          fi
          echo "Running against: $KARATE_BASE_URL"
        env:
          KARATE_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Run tRPC auth smoke suite (production)
        run: pnpm test:karate:trpc-auth
        env:
          KARATE_BASE_URL: ${{ vars.API_BASE_URL }}
          KARATE_ORG_ID: ${{ vars.KARATE_ORG_ID }}
          KARATE_USER_ID: ${{ vars.KARATE_USER_ID }}
          KARATE_API_KEY: ${{ secrets.KARATE_API_KEY }}
