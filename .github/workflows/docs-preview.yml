name: Docs Preview

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/docs/**'
      - 'packages/trpc/**'
      - '.github/workflows/docs-preview.yml'

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter docs build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: apps/docs/.next
          retention-days: 7

      - name: Generate build summary
        run: |
          echo "### Documentation Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changed Paths:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'apps/docs/**' | head -20
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Deploy preview using GitHub Pages (for public repos) or artifact download link
  preview-info:
    name: Preview Information
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Post preview information
        uses: actions/github-script@v7
        with:
          script: |
            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const docsArtifact = artifacts.artifacts.find(a => a.name === 'docs-build');

            const comment = `## Documentation Preview

            The documentation has been built successfully for this PR.

            **Build Artifact:** [Download docs-build](${docsArtifact?.archive_download_url || 'N/A'})

            ### Local Preview
            To preview locally:
            \`\`\`bash
            # Download and extract the artifact, then:
            cd apps/docs
            pnpm start
            \`\`\`

            ### Changes in this PR
            This PR includes changes to the documentation. Please review the changes carefully.

            ---
            *Built with Fumadocs + Next.js*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## Documentation Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

  # Validate documentation
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check docs
        run: pnpm --filter docs exec tsc --noEmit

      - name: Lint docs
        run: pnpm --filter docs lint

      - name: Validate code snippets
        run: |
          echo "### Code Snippet Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cd apps/docs
          if npx tsx scripts/validate-snippets.ts 2>&1 | tee /tmp/snippet-validation.log; then
            echo "All code snippets validated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Snippet validation issues found:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/snippet-validation.log | tail -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Don't fail the build for snippet errors during transition period
            echo "::warning::Some code snippets have validation issues"
          fi

      - name: Check for broken internal links
        run: |
          echo "### Link Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for potential broken links in MDX files
          BROKEN_LINKS=$(grep -r "](/docs/" apps/docs/content --include="*.mdx" | grep -v "^#" || true)

          if [ -n "$BROKEN_LINKS" ]; then
            echo "**Potential internal links found:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$BROKEN_LINKS" | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No issues found with internal links." >> $GITHUB_STEP_SUMMARY
          fi
